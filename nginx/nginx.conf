events {
    worker_connections 1024;
}

http {
    upstream nextjs {
        server nextjs:3000;
    }

    # HTTP → HTTPS 强制重定向（所有 80 端口请求跳转到 https）
    server {
        listen 80;
        server_name milaifeng.cn www.milaifeng.cn;  # 加 www 如果你有解析

        # 可选：允许 Let's Encrypt 验证（如果用 HTTP 方式申请/续期证书）
        location /.well-known/acme-challenge/ {
            root /tmp;  # 或其他临时目录，如果用 acme.sh --webroot
            try_files $uri =404;
        }

        # 其他所有请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 主服务器块
    server {
        listen 443 ssl;
        http2 on;                           # 启用 HTTP/2（可选，提升性能）
        server_name milaifeng.cn www.milaifeng.cn;

        # 证书路径（容器内部路径，根据上面 volumes 挂载）
        ssl_certificate     /etc/nginx/ssl/milaifeng.cn_bundle.crt;
        ssl_certificate_key /etc/nginx/ssl/milaifeng.cn.key;

        # 推荐的安全配置（可选，但强烈建议加）
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（可选，启用后浏览器记住强制 HTTPS）
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;  # 重要！让 Next.js 知道是 https
        }

        location /_next {
            proxy_pass http://nextjs;
        }

        # 可选：静态文件加速（如果有 public/ 下的静态资源）
        # location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        #     proxy_pass http://nextjs;
        #     expires 30d;
        # }
    }
}